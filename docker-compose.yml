# traumainsight/docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:16
    container_name: traumainsight-db
    environment:
      POSTGRES_USER: traumainsight
      POSTGRES_PASSWORD: traumainsight_dev
      POSTGRES_DB: traumainsight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: